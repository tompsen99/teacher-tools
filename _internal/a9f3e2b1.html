<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    }
    .login-box h1 {
      color: #fff;
      text-align: center;
      margin-bottom: 30px;
      font-size: 1.5rem;
    }
    .login-box h1 i { font-size: 2rem; display: block; margin-bottom: 10px; }
    .form-group {
      margin-bottom: 20px;
      position: relative;
    }
    .form-group input {
      width: 100%;
      padding: 15px 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s;
    }
    .form-group input:focus {
      border-color: #4facfe;
      background: rgba(255, 255, 255, 0.15);
    }
    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }
    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(79, 172, 254, 0.4);
    }
    .error-msg {
      color: #ff6b6b;
      text-align: center;
      margin-top: 15px;
      font-size: 0.9rem;
      min-height: 20px;
    }
    .hint {
      color: rgba(255, 255, 255, 0.3);
      text-align: center;
      margin-top: 20px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>
      <i>🔐</i>
      系统管理
    </h1>
    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <input type="password" id="password" placeholder="请输入管理密码" autocomplete="off" autofocus>
      </div>
      <button type="submit" class="btn-login">登 录</button>
      <p class="error-msg" id="errorMsg"></p>
    </form>
    <p class="hint">此页面仅供管理员使用</p>
  </div>

  <script>
    // 密码哈希（SHA-256），实际密码不会明文存储
    // 默认密码: admin2026 （部署前务必修改）
    const ADMIN_PASSWORD_HASH = '5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8';

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      if (!password) {
        errorMsg.textContent = '请输入密码';
        return false;
      }

      try {
        const hash = await sha256(password);

        if (hash === ADMIN_PASSWORD_HASH) {
          // 生成会话token
          const sessionToken = await sha256(Date.now() + Math.random().toString());
          sessionStorage.setItem('admin_session', sessionToken);
          sessionStorage.setItem('admin_auth_time', Date.now().toString());

          // 跳转到管理页面
          window.location.href = 'dashboard.html';
        } else {
          errorMsg.textContent = '密码错误';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch (err) {
        errorMsg.textContent = '验证失败，请重试';
      }

      return false;
    }

    // 检查是否已登录
    if (sessionStorage.getItem('admin_session')) {
      const authTime = parseInt(sessionStorage.getItem('admin_auth_time') || '0');
      const now = Date.now();
      // 会话有效期2小时
      if (now - authTime < 2 * 60 * 60 * 1000) {
        window.location.href = 'dashboard.html';
      } else {
        sessionStorage.removeItem('admin_session');
        sessionStorage.removeItem('admin_auth_time');
      }
    }
  </script>
</body>
</html>
