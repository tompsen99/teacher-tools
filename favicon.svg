<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Toolbox body -->
  <rect x="8" y="28" width="48" height="28" rx="4" fill="#4A90D9" stroke="#2C5F8A" stroke-width="2"/>
  <!-- Toolbox lid -->
  <rect x="6" y="22" width="52" height="10" rx="3" fill="#5BA0E6" stroke="#2C5F8A" stroke-width="2"/>
  <!-- Handle -->
  <path d="M22 22 V16 Q22 10 32 10 Q42 10 42 16 V22" fill="none" stroke="#2C5F8A" stroke-width="3" stroke-linecap="round"/>
  <!-- Handle base plates -->
  <rect x="20" y="18" width="8" height="4" rx="1" fill="#5BA0E6" stroke="#2C5F8A" stroke-width="1.5"/>
  <rect x="36" y="18" width="8" height="4" rx="1" fill="#5BA0E6" stroke="#2C5F8A" stroke-width="1.5"/>
  <!-- Center clasp -->
  <rect x="27" y="32" width="10" height="6" rx="2" fill="#FFD700" stroke="#B8960F" stroke-width="1"/>
  <!-- Pencil icon on toolbox -->
  <g transform="translate(16,36) rotate(-30, 8, 0)">
    <rect x="0" y="-2" width="16" height="4" rx="1" fill="#FFD700"/>
    <polygon points="16,-2 22,0 16,2" fill="#FFB366"/>
    <rect x="-2" y="-2" width="3" height="4" rx="0.5" fill="#E8A0C0"/>
  </g>
  <!-- Star accent -->
  <polygon points="48,40 49.5,44 54,44 50.5,46.5 51.5,50.5 48,48 44.5,50.5 45.5,46.5 42,44 46.5,44" fill="#FFD700"/>
</svg>
