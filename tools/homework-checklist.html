<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作业检查表 | 教师工具站</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/theme.css">
  <link rel="stylesheet" href="../assets/css/icons.css">
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/member.js"></script>
  <script src="../assets/js/component.js"></script>
  <style>
    .workspace {
      max-width: 1000px;
      margin: 0 auto;
      padding: var(--space-5);
    }
    .tool-card {
      background: var(--card);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      box-shadow: var(--shadow);
    }
    .tool-header {
      text-align: center;
      margin-bottom: var(--space-6);
    }
    .tool-header h2 {
      font-size: 1.8rem;
      margin-bottom: var(--space-2);
    }
    .tool-header p {
      color: var(--text-light);
    }
    .input-area {
      margin-bottom: var(--space-5);
    }
    .input-area textarea {
      width: 100%;
      min-height: 120px;
      padding: var(--space-4);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      font-size: 1rem;
      resize: vertical;
      font-family: inherit;
    }
    .input-area textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .btn-row {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
      margin-bottom: var(--space-5);
    }
    .btn {
      padding: var(--space-2) var(--space-5);
      border: none;
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #fff;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text);
    }
    .btn-secondary:hover { background: var(--border); }
    .result-area {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      min-height: 200px;
    }
    .result-area h3 {
      margin-bottom: var(--space-3);
      color: var(--primary);
    }
    .result-content {
      font-size: 1rem;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }
    .stat-item {
      background: var(--bg-secondary);
      padding: var(--space-4);
      border-radius: var(--radius-lg);
      text-align: center;
    }
    .stat-item .value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
    }
    .stat-item .label {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-top: var(--space-1);
    }
    .list-area {
      max-height: 400px;
      overflow-y: auto;
    }
    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--border-light);
    }
    .list-item:last-child { border-bottom: none; }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      background: var(--primary-light);
      color: #fff;
      border-radius: 12px;
      font-size: 0.75rem;
    }
    @media (max-width: 768px) {
      .workspace { padding: var(--space-3); }
      .btn-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="app-navbar"></div>
  <div class="workspace">
    <div class="tool-card">
      <div class="tool-header">
        <h2><i class="fas fa-clipboard-check"></i> 作业检查表</h2>
        <p> | 教师工具站</p>
      </div>
      
      <div class="input-area">
        <label>输入学生名单（每行一个）</label>
        <textarea id="names" placeholder="张三
李四
王五">张三
李四
王五</textarea>
      </div>
      <div class="input-area">
        <label>作业名称</label>
        <input type="text" id="hwName" value="第1次作业" style="width:100%;padding:12px;border:2px solid var(--border);border-radius:var(--radius-md);font-size:1rem">
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="generate()"><i class="fas fa-list"></i> 生成</button>
        <button class="btn btn-secondary" onclick="checkAll()"><i class="fas fa-check-double"></i> 全选</button>
        <button class="btn btn-secondary" onclick="uncheckAll()"><i class="fas fa-times"></i> 全不选</button>
      </div>
      <div class="list-area" id="checklist"></div>
      <div class="stat-grid" id="hwStats"></div>
      <script>
        function generate(){
          const names=document.getElementById('names').value.trim().split('\n');
          document.getElementById('checklist').innerHTML=names.map(n=>'<div class="list-item"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" class="hw-check" style="width:18px;height:18px"><span>'+n.trim()+'</span></label></div>').join('');
          updateStats();
        }
        function updateStats(){
          const checks=document.querySelectorAll('.hw-check');
          const total=checks.length;
          const checked=[...checks].filter(c=>c.checked).length;
          document.getElementById('hwStats').innerHTML='<div class="stat-item"><div class="value">'+checked+'</div><div class="label">已交</div></div><div class="stat-item"><div class="value">'+(total-checked)+'</div><div class="label">未交</div></div><div class="stat-item"><div class="value">'+Math.round(checked/total*100)+'%</div><div class="label">提交率</div></div>';
        }
        function checkAll(){document.querySelectorAll('.hw-check').forEach(c=>{c.checked=true});updateStats();}
        function uncheckAll(){document.querySelectorAll('.hw-check').forEach(c=>{c.checked=false});updateStats();}
      </script>
    </div>
  </div>
  <div id="app-footer"></div>
  <div id="app-modal"></div>
  <script>
    PageComponents.initPage({ title: '作业检查表', icon: 'fa-clipboard-check' });
  </script>
</body>
</html>
