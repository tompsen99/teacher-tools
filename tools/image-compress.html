<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片压缩工具 | 教师工具站</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/theme.css">
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/member.js"></script>
  <script src="../assets/js/component.js"></script>
  <style>
    .workspace {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--space-5);
    }

    .upload-area {
      border: 3px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-12) var(--space-6);
      text-align: center;
      transition: all var(--transition);
      cursor: pointer;
      background: var(--card);
    }

    .upload-area:hover, .upload-area.dragover {
      border-color: var(--primary);
      background: var(--primary-bg);
    }

    .upload-area i {
      font-size: 4rem;
      color: var(--primary-light);
      margin-bottom: var(--space-4);
    }

    .upload-area h3 {
      margin-bottom: var(--space-2);
    }

    .upload-area p {
      color: var(--text-light);
    }

    .settings-bar {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-4);
      background: var(--card);
      border-radius: var(--radius-lg);
      margin: var(--space-4) 0;
      flex-wrap: wrap;
    }

    .setting-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .setting-item label {
      font-size: 0.9rem;
      font-weight: 500;
      white-space: nowrap;
    }

    .setting-item input[type="range"] {
      width: 150px;
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-4);
      margin-top: var(--space-4);
    }

    .image-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: all var(--transition);
    }

    .image-card:hover {
      box-shadow: var(--shadow-lg);
    }

    .image-preview {
      height: 200px;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .image-preview img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .image-info {
      padding: var(--space-4);
    }

    .image-name {
      font-weight: 600;
      margin-bottom: var(--space-2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .image-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--text-light);
      margin-bottom: var(--space-3);
    }

    .size-reduction {
      color: var(--success);
      font-weight: 600;
    }

    .image-actions {
      display: flex;
      gap: var(--space-2);
    }

    .image-actions .btn {
      flex: 1;
    }

    .progress-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
    }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: var(--space-4);
      margin: var(--space-4) 0;
    }

    .stat-item {
      background: var(--card);
      padding: var(--space-4);
      border-radius: var(--radius-md);
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-light);
    }
  </style>
</head>
<body>
  <div id="app-navbar"></div>
  <div id="app-modal"></div>

  <div class="workspace">
    <!-- 上传区域 -->
    <div class="upload-area" id="uploadArea">
      <i class="fas fa-cloud-upload-alt"></i>
      <h3>拖拽图片到这里，或点击选择文件</h3>
      <p>支持 JPG、PNG、WebP 格式，可同时上传多张</p>
      <input type="file" id="fileInput" accept="image/*" multiple style="display: none;">
    </div>

    <!-- 压缩设置 -->
    <div class="settings-bar">
      <div class="setting-item">
        <label>压缩质量：</label>
        <input type="range" id="quality" min="10" max="100" value="80">
        <span id="qualityValue">80%</span>
      </div>
      <div class="setting-item">
        <label>最大宽度：</label>
        <select id="maxWidth" class="form-select" style="width: auto;">
          <option value="0">不限制</option>
          <option value="1920">1920px</option>
          <option value="1280" selected>1280px</option>
          <option value="1024">1024px</option>
          <option value="800">800px</option>
        </select>
      </div>
      <div class="setting-item">
        <label>输出格式：</label>
        <select id="outputFormat" class="form-select" style="width: auto;">
          <option value="same">保持原格式</option>
          <option value="jpeg">JPEG</option>
          <option value="png">PNG</option>
          <option value="webp">WebP</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="compressAll()">
        <i class="fas fa-compress"></i> 全部压缩
      </button>
      <button class="btn btn-success" onclick="downloadAll()">
        <i class="fas fa-download"></i> 全部下载
      </button>
      <button class="btn btn-danger" onclick="clearAll()">
        <i class="fas fa-trash"></i> 清空
      </button>
    </div>

    <!-- 统计信息 -->
    <div class="stats-bar" id="statsBar" style="display: none;">
      <div class="stat-item">
        <div class="stat-value" id="totalCount">0</div>
        <div class="stat-label">图片数量</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="originalSize">0 KB</div>
        <div class="stat-label">原始大小</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="compressedSize">0 KB</div>
        <div class="stat-label">压缩后大小</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="savedPercent">0%</div>
        <div class="stat-label">节省空间</div>
      </div>
    </div>

    <!-- 图片列表 -->
    <div class="image-grid" id="imageGrid"></div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const qualitySlider = document.getElementById('quality');
    const qualityValue = document.getElementById('qualityValue');

    let images = []; // {id, file, name, originalSize, compressedSize, originalUrl, compressedUrl, status}

    // 绑定事件
    qualitySlider.addEventListener('input', () => {
      qualityValue.textContent = qualitySlider.value + '%';
    });

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    function handleFiles(files) {
      for (const file of files) {
        if (!file.type.startsWith('image/')) continue;

        const id = Date.now() + Math.random();
        const url = URL.createObjectURL(file);

        images.push({
          id,
          file,
          name: file.name,
          originalSize: file.size,
          compressedSize: null,
          originalUrl: url,
          compressedUrl: null,
          status: 'pending'
        });
      }

      renderGrid();
      updateStats();
    }

    function renderGrid() {
      const grid = document.getElementById('imageGrid');
      grid.innerHTML = images.map(img => `
        <div class="image-card" id="card-${img.id}">
          <div class="image-preview">
            <img src="${img.compressedUrl || img.originalUrl}" alt="${img.name}">
            ${img.status === 'compressing' ? '<div class="progress-overlay"><i class="fas fa-spinner fa-spin"></i> 压缩中...</div>' : ''}
          </div>
          <div class="image-info">
            <div class="image-name" title="${img.name}">${img.name}</div>
            <div class="image-meta">
              <span>原始：${formatSize(img.originalSize)}</span>
              ${img.compressedSize !== null ? `
                <span class="size-reduction">↓ ${Math.round((1 - img.compressedSize / img.originalSize) * 100)}%</span>
                <span>压缩后：${formatSize(img.compressedSize)}</span>
              ` : ''}
            </div>
            <div class="image-actions">
              <button class="btn btn-primary btn-sm" onclick="compressOne(${img.id})" ${img.status === 'compressing' ? 'disabled' : ''}>
                <i class="fas fa-compress"></i> 压缩
              </button>
              <button class="btn btn-success btn-sm" onclick="downloadOne(${img.id})" ${!img.compressedUrl ? 'disabled' : ''}>
                <i class="fas fa-download"></i> 下载
              </button>
              <button class="btn btn-danger btn-sm" onclick="removeOne(${img.id})">
                <i class="fas fa-times"></i>
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function updateStats() {
      const statsBar = document.getElementById('statsBar');
      if (images.length === 0) {
        statsBar.style.display = 'none';
        return;
      }

      statsBar.style.display = 'grid';
      document.getElementById('totalCount').textContent = images.length;

      const originalTotal = images.reduce((sum, img) => sum + img.originalSize, 0);
      const compressedTotal = images.reduce((sum, img) => sum + (img.compressedSize || img.originalSize), 0);

      document.getElementById('originalSize').textContent = formatSize(originalTotal);
      document.getElementById('compressedSize').textContent = formatSize(compressedTotal);
      document.getElementById('savedPercent').textContent = Math.round((1 - compressedTotal / originalTotal) * 100) + '%';
    }

    async function compressOne(id) {
      const img = images.find(i => i.id === id);
      if (!img || img.status === 'compressing') return;

      img.status = 'compressing';
      renderGrid();

      const quality = parseInt(qualitySlider.value) / 100;
      const maxWidth = parseInt(document.getElementById('maxWidth').value);
      const outputFormat = document.getElementById('outputFormat').value;

      try {
        const result = await compressImage(img.file, quality, maxWidth, outputFormat);
        img.compressedSize = result.blob.size;
        img.compressedUrl = result.url;
        img.compressedFile = result.blob;
        img.status = 'done';
      } catch (err) {
        console.error('压缩失败:', err);
        img.status = 'error';
      }

      renderGrid();
      updateStats();
    }

    async function compressAll() {
      for (const img of images) {
        if (img.status !== 'done') {
          await compressOne(img.id);
        }
      }
    }

    function compressImage(file, quality, maxWidth, outputFormat) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let { width, height } = img;

          // 限制宽度
          if (maxWidth > 0 && width > maxWidth) {
            height = (height * maxWidth) / width;
            width = maxWidth;
          }

          canvas.width = width;
          canvas.height = height;

          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);

          // 确定输出格式
          let mimeType;
          if (outputFormat === 'same') {
            mimeType = file.type || 'image/jpeg';
          } else if (outputFormat === 'jpeg') {
            mimeType = 'image/jpeg';
          } else if (outputFormat === 'png') {
            mimeType = 'image/png';
          } else if (outputFormat === 'webp') {
            mimeType = 'image/webp';
          }

          canvas.toBlob((blob) => {
            resolve({
              blob,
              url: URL.createObjectURL(blob)
            });
          }, mimeType, quality);
        };
        img.onerror = reject;
        img.src = URL.createObjectURL(file);
      });
    }

    function downloadOne(id) {
      const img = images.find(i => i.id === id);
      if (!img || !img.compressedUrl) return;

      const link = document.createElement('a');
      link.href = img.compressedUrl;
      link.download = 'compressed_' + img.name;
      link.click();
    }

    function downloadAll() {
      images.forEach(img => {
        if (img.compressedUrl) downloadOne(img.id);
      });
    }

    function removeOne(id) {
      images = images.filter(i => i.id !== id);
      renderGrid();
      updateStats();
    }

    function clearAll() {
      images = [];
      renderGrid();
      updateStats();
    }
    PageComponents.initPage({ title: '图片压缩工具', icon: 'fa-compress-alt' });
  </script>
  <div id="app-footer"></div>
</body>
</html>
