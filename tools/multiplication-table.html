<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乘法口诀表 | 教师工具站</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/theme.css">
  <link rel="stylesheet" href="../assets/css/icons.css">
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/member.js"></script>
  <script src="../assets/js/component.js"></script>
  <style>
    .workspace {
      max-width: 1000px;
      margin: 0 auto;
      padding: var(--space-5);
    }
    .tool-card {
      background: var(--card);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      box-shadow: var(--shadow);
    }
    .tool-header {
      text-align: center;
      margin-bottom: var(--space-6);
    }
    .tool-header h2 {
      font-size: 1.8rem;
      margin-bottom: var(--space-2);
    }
    .tool-header p {
      color: var(--text-light);
    }
    .input-area {
      margin-bottom: var(--space-5);
    }
    .input-area textarea {
      width: 100%;
      min-height: 120px;
      padding: var(--space-4);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      font-size: 1rem;
      resize: vertical;
      font-family: inherit;
    }
    .input-area textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .btn-row {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
      margin-bottom: var(--space-5);
    }
    .btn {
      padding: var(--space-2) var(--space-5);
      border: none;
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #fff;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text);
    }
    .btn-secondary:hover { background: var(--border); }
    .result-area {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      min-height: 200px;
    }
    .result-area h3 {
      margin-bottom: var(--space-3);
      color: var(--primary);
    }
    .result-content {
      font-size: 1rem;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }
    .stat-item {
      background: var(--bg-secondary);
      padding: var(--space-4);
      border-radius: var(--radius-lg);
      text-align: center;
    }
    .stat-item .value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
    }
    .stat-item .label {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-top: var(--space-1);
    }
    .list-area {
      max-height: 400px;
      overflow-y: auto;
    }
    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--border-light);
    }
    .list-item:last-child { border-bottom: none; }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      background: var(--primary-light);
      color: #fff;
      border-radius: 12px;
      font-size: 0.75rem;
    }
    @media (max-width: 768px) {
      .workspace { padding: var(--space-3); }
      .btn-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="app-navbar"></div>
  <div class="workspace">
    <div class="tool-card">
      <div class="tool-header">
        <h2><i class="fas fa-times"></i> 乘法口诀表</h2>
        <p> | 教师工具站</p>
      </div>
      
      <div class="btn-row">
        <button class="btn btn-primary" onclick="showTable()"><i class="fas fa-table"></i> 口诀表</button>
        <button class="btn btn-secondary" onclick="startQuiz()"><i class="fas fa-question"></i> 练习模式</button>
      </div>
      <div id="tableArea"></div>
      <script>
        function showTable(){
          let html='<table style="width:100%;border-collapse:collapse;text-align:center">';
          html+='<tr><th style="padding:8px;background:var(--primary);color:#fff">×</th>';
          for(let i=1;i<=9;i++)html+='<th style="padding:8px;background:var(--primary);color:#fff">'+i+'</th>';
          html+='</tr>';
          for(let i=1;i<=9;i++){
            html+='<tr><td style="padding:8px;background:var(--primary);color:#fff;font-weight:700">'+i+'</td>';
            for(let j=1;j<=9;j++){
              const val=i*j;
              const bg=(i===j)?'var(--primary-light)':'var(--bg-secondary)';
              html+='<td style="padding:8px;background:'+bg+';border:1px solid var(--border)">'+val+'</td>';
            }
            html+='</tr>';
          }
          html+='</table>';
          document.getElementById('tableArea').innerHTML=html;
        }
        function startQuiz(){
          const a=Math.ceil(Math.random()*9),b=Math.ceil(Math.random()*9);
          document.getElementById('tableArea').innerHTML=
            '<div style="text-align:center;padding:40px"><div style="font-size:3rem;font-weight:700;margin-bottom:20px">'+a+' × '+b+' = ?</div><input type="number" id="answer" style="font-size:2rem;width:120px;text-align:center;padding:8px;border:2px solid var(--border);border-radius:12px"><button class="btn btn-primary" style="margin-left:12px;font-size:1.5rem;padding:8px 24px" onclick="checkAnswer('+a+','+b+')">✓</button><div id="feedback" style="margin-top:16px;font-size:1.5rem"></div></div>';
          document.getElementById('answer').focus();
        }
        function checkAnswer(a,b){
          const input=document.getElementById('answer').value;
          const fb=document.getElementById('feedback');
          if(parseInt(input)===a*b){fb.innerHTML='✅ 正确！';fb.style.color='var(--success)';setTimeout(startQuiz,1000);}
          else{fb.innerHTML='❌ 再想想';fb.style.color='var(--danger)';}
        }
        showTable();
      </script>
    </div>
  </div>
  <div id="app-footer"></div>
  <div id="app-modal"></div>
  <script>
    PageComponents.initPage({ title: '乘法口诀表', icon: 'fa-times' });
  </script>
</body>
</html>
