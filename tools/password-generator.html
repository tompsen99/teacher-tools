<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码生成器 | 教师工具站</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/theme.css">
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/member.js"></script>
  <script src="../assets/js/component.js"></script>
  <style>
    .workspace {
      max-width: 700px;
      margin: 0 auto;
      padding: var(--space-5);
    }

    .password-display {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      text-align: center;
      margin: var(--space-5) 0;
    }

    .password-text {
      font-family: 'Courier New', monospace;
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      word-break: break-all;
      letter-spacing: 2px;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .password-actions {
      display: flex;
      gap: var(--space-3);
      justify-content: center;
      margin-top: var(--space-4);
    }

    .strength-meter {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin: var(--space-3) 0;
    }

    .strength-meter .fill {
      height: 100%;
      border-radius: 4px;
      transition: all 0.3s;
    }

    .strength-weak { background: var(--danger); width: 25%; }
    .strength-fair { background: var(--warning); width: 50%; }
    .strength-good { background: var(--info); width: 75%; }
    .strength-strong { background: var(--success); width: 100%; }

    .history-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) var(--space-3);
      background: var(--bg);
      border-radius: var(--radius);
      margin-bottom: var(--space-2);
      font-family: monospace;
    }

    .history-item .password {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-item .copy-btn {
      cursor: pointer;
      color: var(--primary);
      padding: 4px;
    }

    .history-item .copy-btn:hover {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="app-navbar"></div>
  <div id="app-modal"></div>

  <div class="workspace">
    <div class="text-center">
      <h1>🔐 密码生成器</h1>
      <p style="color: var(--text-light);">生成安全随机密码</p>
    </div>

    <!-- 密码显示 -->
    <div class="password-display">
      <div class="password-text" id="passwordText">点击生成密码</div>
      <div class="strength-meter">
        <div class="fill" id="strengthFill"></div>
      </div>
      <div style="font-size: 0.9rem; color: var(--text-light);">
        密码强度：<span id="strengthText">-</span>
      </div>
      <div class="password-actions">
        <button class="btn btn-primary" onclick="generate()">
          <i class="fas fa-sync-alt"></i> 生成密码
        </button>
        <button class="btn btn-secondary" onclick="copyPassword()">
          <i class="fas fa-copy"></i> 复制
        </button>
      </div>
    </div>

    <!-- 设置 -->
    <div class="card">
      <div class="card-header">
        <div class="card-title"><i class="fas fa-cog"></i> 密码设置</div>
      </div>

      <div class="form-group">
        <label class="form-label">密码长度：<span id="lengthLabel">16</span></label>
        <input type="range" id="lengthSlider" min="4" max="64" value="16" oninput="updateLength()">
      </div>

      <div class="form-group">
        <div class="form-check">
          <input type="checkbox" id="uppercase" checked onchange="generate()">
          <label>大写字母 (A-Z)</label>
        </div>
      </div>

      <div class="form-group">
        <div class="form-check">
          <input type="checkbox" id="lowercase" checked onchange="generate()">
          <label>小写字母 (a-z)</label>
        </div>
      </div>

      <div class="form-group">
        <div class="form-check">
          <input type="checkbox" id="numbers" checked onchange="generate()">
          <label>数字 (0-9)</label>
        </div>
      </div>

      <div class="form-group">
        <div class="form-check">
          <input type="checkbox" id="symbols" checked onchange="generate()">
          <label>特殊符号 (!@#$%^&*)</label>
        </div>
      </div>

      <div class="form-group">
        <div class="form-check">
          <input type="checkbox" id="excludeSimilar" onchange="generate()">
          <label>排除相似字符 (i, l, 1, L, o, 0, O)</label>
        </div>
      </div>

      <button class="btn btn-primary" style="width: 100%;" onclick="generate()">
        <i class="fas fa-key"></i> 生成密码
      </button>
    </div>

    <!-- 批量生成 -->
    <div class="card" style="margin-top: var(--space-4);">
      <div class="card-header">
        <div class="card-title"><i class="fas fa-list"></i> 批量生成</div>
        <button class="btn btn-secondary btn-sm" onclick="generateBatch()">
          <i class="fas fa-sync-alt"></i> 生成10个
        </button>
      </div>
      <div id="batchList"></div>
    </div>

    <!-- 历史记录 -->
    <div class="card" style="margin-top: var(--space-4);">
      <div class="card-header">
        <div class="card-title"><i class="fas fa-history"></i> 历史记录</div>
        <button class="btn btn-ghost btn-sm" onclick="clearHistory()">清空</button>
      </div>
      <div id="historyList">
        <p style="color: var(--text-muted); text-align: center; padding: 20px;">暂无历史记录</p>
      </div>
    </div>
  </div>

  <script>
    let history = [];

    function updateLength() {
      document.getElementById('lengthLabel').textContent = document.getElementById('lengthSlider').value;
      generate();
    }

    function generate() {
      const length = parseInt(document.getElementById('lengthSlider').value);
      const useUpper = document.getElementById('uppercase').checked;
      const useLower = document.getElementById('lowercase').checked;
      const useNumbers = document.getElementById('numbers').checked;
      const useSymbols = document.getElementById('symbols').checked;
      const excludeSimilar = document.getElementById('excludeSimilar').checked;

      let chars = '';
      if (useUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      if (useLower) chars += 'abcdefghijklmnopqrstuvwxyz';
      if (useNumbers) chars += '0123456789';
      if (useSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

      if (excludeSimilar) {
        chars = chars.replace(/[ilLI1oO0]/g, '');
      }

      if (!chars) {
        alert('请至少选择一种字符类型');
        return;
      }

      const password = Array.from(crypto.getRandomValues(new Uint32Array(length)))
        .map(x => chars[x % chars.length])
        .join('');

      document.getElementById('passwordText').textContent = password;
      updateStrength(password);
      addToHistory(password);
    }

    function updateStrength(password) {
      const length = password.length;
      const hasUpper = /[A-Z]/.test(password);
      const hasLower = /[a-z]/.test(password);
      const hasNumbers = /[0-9]/.test(password);
      const hasSymbols = /[^A-Za-z0-9]/.test(password);

      let score = 0;
      if (length >= 8) score++;
      if (length >= 12) score++;
      if (length >= 16) score++;
      if (hasUpper && hasLower) score++;
      if (hasNumbers) score++;
      if (hasSymbols) score++;

      const fill = document.getElementById('strengthFill');
      const text = document.getElementById('strengthText');

      if (score <= 2) {
        fill.className = 'fill strength-weak';
        text.textContent = '弱';
        text.style.color = 'var(--danger)';
      } else if (score <= 3) {
        fill.className = 'fill strength-fair';
        text.textContent = '一般';
        text.style.color = 'var(--warning)';
      } else if (score <= 4) {
        fill.className = 'fill strength-good';
        text.textContent = '良好';
        text.style.color = 'var(--info)';
      } else {
        fill.className = 'fill strength-strong';
        text.textContent = '强';
        text.style.color = 'var(--success)';
      }
    }

    function copyPassword() {
      const password = document.getElementById('passwordText').textContent;
      if (password === '点击生成密码') return;

      navigator.clipboard.writeText(password).then(() => {
        alert('密码已复制！');
      });
    }

    function addToHistory(password) {
      history.unshift(password);
      if (history.length > 20) history.pop();
      renderHistory();
    }

    function renderHistory() {
      const list = document.getElementById('historyList');
      if (history.length === 0) {
        list.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 20px;">暂无历史记录</p>';
        return;
      }

      list.innerHTML = history.map(p => `
        <div class="history-item">
          <span class="password">${p}</span>
          <span class="copy-btn" onclick="navigator.clipboard.writeText('${p}').then(() => alert('已复制！'))">
            <i class="fas fa-copy"></i>
          </span>
        </div>
      `).join('');
    }

    function clearHistory() {
      history = [];
      renderHistory();
    }

    function generateBatch() {
      const length = parseInt(document.getElementById('lengthSlider').value);
      const useUpper = document.getElementById('uppercase').checked;
      const useLower = document.getElementById('lowercase').checked;
      const useNumbers = document.getElementById('numbers').checked;
      const useSymbols = document.getElementById('symbols').checked;

      let chars = '';
      if (useUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      if (useLower) chars += 'abcdefghijklmnopqrstuvwxyz';
      if (useNumbers) chars += '0123456789';
      if (useSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

      if (!chars) {
        alert('请至少选择一种字符类型');
        return;
      }

      const passwords = [];
      for (let i = 0; i < 10; i++) {
        const password = Array.from(crypto.getRandomValues(new Uint32Array(length)))
          .map(x => chars[x % chars.length])
          .join('');
        passwords.push(password);
      }

      const container = document.getElementById('batchList');
      container.innerHTML = passwords.map(p => `
        <div class="history-item">
          <span class="password">${p}</span>
          <span class="copy-btn" onclick="navigator.clipboard.writeText('${p}').then(() => alert('已复制！'))">
            <i class="fas fa-copy"></i>
          </span>
        </div>
      `).join('');
    }

    // 初始化
    generate();
  </script>
  <div id="app-footer"></div>
  <script>PageComponents.initPage({ title: '密码生成器', icon: 'fa-key' });</script>
</body>
</html>
