<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课堂计分板 | 教师工具站</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/theme.css">
  <link rel="stylesheet" href="../assets/css/icons.css">
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/member.js"></script>
  <script src="../assets/js/component.js"></script>
  <style>
    .workspace {
      max-width: 1000px;
      margin: 0 auto;
      padding: var(--space-5);
    }
    .tool-card {
      background: var(--card);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      box-shadow: var(--shadow);
    }
    .tool-header {
      text-align: center;
      margin-bottom: var(--space-6);
    }
    .tool-header h2 {
      font-size: 1.8rem;
      margin-bottom: var(--space-2);
    }
    .tool-header p {
      color: var(--text-light);
    }
    .input-area {
      margin-bottom: var(--space-5);
    }
    .input-area textarea {
      width: 100%;
      min-height: 120px;
      padding: var(--space-4);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      font-size: 1rem;
      resize: vertical;
      font-family: inherit;
    }
    .input-area textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .btn-row {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
      margin-bottom: var(--space-5);
    }
    .btn {
      padding: var(--space-2) var(--space-5);
      border: none;
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #fff;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text);
    }
    .btn-secondary:hover { background: var(--border); }
    .result-area {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      min-height: 200px;
    }
    .result-area h3 {
      margin-bottom: var(--space-3);
      color: var(--primary);
    }
    .result-content {
      font-size: 1rem;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }
    .stat-item {
      background: var(--bg-secondary);
      padding: var(--space-4);
      border-radius: var(--radius-lg);
      text-align: center;
    }
    .stat-item .value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
    }
    .stat-item .label {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-top: var(--space-1);
    }
    .list-area {
      max-height: 400px;
      overflow-y: auto;
    }
    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--border-light);
    }
    .list-item:last-child { border-bottom: none; }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      background: var(--primary-light);
      color: #fff;
      border-radius: 12px;
      font-size: 0.75rem;
    }
    @media (max-width: 768px) {
      .workspace { padding: var(--space-3); }
      .btn-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="app-navbar"></div>
  <div class="workspace">
    <div class="tool-card">
      <div class="tool-header">
        <h2><i class="fas fa-trophy"></i> 课堂计分板</h2>
        <p> | 教师工具站</p>
      </div>
      
      <div class="input-area">
        <label>输入小组名称（每行一个）</label>
        <textarea id="groups" style="min-height:60px">红队
蓝队
绿队
黄队</textarea>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="initBoard()"><i class="fas fa-play"></i> 开始</button>
        <button class="btn btn-secondary" onclick="resetBoard()"><i class="fas fa-redo"></i> 重置</button>
      </div>
      <div id="scoreboard" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px"></div>
      <script>
        let scores={};
        function initBoard(){
          const names=document.getElementById('groups').value.trim().split('\n');
          scores={};names.forEach(n=>{if(n.trim())scores[n.trim()]=0});
          renderBoard();
        }
        function renderBoard(){
          const colors=['#ef4444','#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899'];
          document.getElementById('scoreboard').innerHTML=Object.entries(scores).map(([name,score],i)=>
            '<div style="background:'+colors[i%colors.length]+'15;border:2px solid '+colors[i%colors.length]+'40;border-radius:16px;padding:20px;text-align:center"><div style="font-size:1.2rem;font-weight:700;margin-bottom:8px">'+name+'</div><div style="font-size:3rem;font-weight:800;color:'+colors[i%colors.length]+'">'+score+'</div><div style="display:flex;gap:8px;justify-content:center;margin-top:12px"><button class="btn" style="background:'+colors[i%colors.length]+';color:#fff;padding:6px 16px" onclick="scores[\''+name+'\']++;renderBoard()">+1</button><button class="btn" style="background:'+colors[i%colors.length]+'20;color:'+colors[i%colors.length]+';padding:6px 16px" onclick="scores[\''+name+'\']--;renderBoard()">-1</button></div></div>'
          ).join('');
        }
        function resetBoard(){Object.keys(scores).forEach(k=>{scores[k]=0});renderBoard();}
      </script>
    </div>
  </div>
  <div id="app-footer"></div>
  <div id="app-modal"></div>
  <script>
    PageComponents.initPage({ title: '课堂计分板', icon: 'fa-trophy' });
  </script>
</body>
</html>
