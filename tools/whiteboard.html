<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>涂鸦白板 | 教师工具站</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/theme.css">
  <link rel="stylesheet" href="../assets/css/icons.css">
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/member.js"></script>
  <script src="../assets/js/component.js"></script>
  <style>
    .workspace {
      max-width: 1000px;
      margin: 0 auto;
      padding: var(--space-5);
    }
    .tool-card {
      background: var(--card);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      box-shadow: var(--shadow);
    }
    .tool-header {
      text-align: center;
      margin-bottom: var(--space-6);
    }
    .tool-header h2 {
      font-size: 1.8rem;
      margin-bottom: var(--space-2);
    }
    .tool-header p {
      color: var(--text-light);
    }
    .input-area {
      margin-bottom: var(--space-5);
    }
    .input-area textarea {
      width: 100%;
      min-height: 120px;
      padding: var(--space-4);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      font-size: 1rem;
      resize: vertical;
      font-family: inherit;
    }
    .input-area textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .btn-row {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
      margin-bottom: var(--space-5);
    }
    .btn {
      padding: var(--space-2) var(--space-5);
      border: none;
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #fff;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text);
    }
    .btn-secondary:hover { background: var(--border); }
    .result-area {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      min-height: 200px;
    }
    .result-area h3 {
      margin-bottom: var(--space-3);
      color: var(--primary);
    }
    .result-content {
      font-size: 1rem;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }
    .stat-item {
      background: var(--bg-secondary);
      padding: var(--space-4);
      border-radius: var(--radius-lg);
      text-align: center;
    }
    .stat-item .value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
    }
    .stat-item .label {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-top: var(--space-1);
    }
    .list-area {
      max-height: 400px;
      overflow-y: auto;
    }
    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--border-light);
    }
    .list-item:last-child { border-bottom: none; }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      background: var(--primary-light);
      color: #fff;
      border-radius: 12px;
      font-size: 0.75rem;
    }
    @media (max-width: 768px) {
      .workspace { padding: var(--space-3); }
      .btn-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="app-navbar"></div>
  <div class="workspace">
    <div class="tool-card">
      <div class="tool-header">
        <h2><i class="fas fa-paint-brush"></i> 涂鸦白板</h2>
        <p> | 教师工具站</p>
      </div>
      
      <div class="btn-row">
        <button class="btn btn-primary" onclick="setTool('pen')"><i class="fas fa-pen"></i> 画笔</button>
        <button class="btn btn-secondary" onclick="setTool('eraser')"><i class="fas fa-eraser"></i> 橡皮</button>
        <button class="btn btn-secondary" onclick="setTool('rect')"><i class="fas fa-square"></i> 矩形</button>
        <button class="btn btn-secondary" onclick="setTool('circle')"><i class="fas fa-circle"></i> 圆形</button>
        <button class="btn btn-secondary" onclick="clearCanvas()"><i class="fas fa-trash"></i> 清空</button>
        <button class="btn btn-secondary" onclick="saveCanvas()"><i class="fas fa-download"></i> 保存</button>
        <input type="color" id="colorPicker" value="#333" style="width:40px;height:36px;border:none;cursor:pointer">
        <input type="range" id="lineWidth" min="1" max="20" value="3" style="width:100px">
      </div>
      <canvas id="drawCanvas" style="width:100%;height:500px;border:2px solid var(--border);border-radius:var(--radius-lg);cursor:crosshair;background:#fff"></canvas>
      <script>
        const canvas=document.getElementById('drawCanvas');
        const ctx=canvas.getContext('2d');
        let drawing=false,tool='pen',startX,startY;
        canvas.width=canvas.offsetWidth*2;canvas.height=canvas.offsetHeight*2;ctx.scale(2,2);
        canvas.onpointerdown=e=>{drawing=true;startX=e.offsetX;startY=e.offsetY;ctx.beginPath();ctx.moveTo(e.offsetX,e.offsetY)};
        canvas.onpointermove=e=>{if(!drawing)return;if(tool==='pen'||tool==='eraser'){ctx.strokeStyle=tool==='eraser'?'#fff':document.getElementById('colorPicker').value;ctx.lineWidth=document.getElementById('lineWidth').value;ctx.lineCap='round';ctx.lineTo(e.offsetX,e.offsetY);ctx.stroke()}};
        canvas.onpointerup=e=>{drawing=false;if(tool==='rect'){ctx.strokeStyle=document.getElementById('colorPicker').value;ctx.strokeRect(startX,startY,e.offsetX-startX,e.offsetY-startY)}else if(tool==='circle'){ctx.beginPath();ctx.arc(startX,startY,Math.hypot(e.offsetX-startX,e.offsetY-startY),0,Math.PI*2);ctx.strokeStyle=document.getElementById('colorPicker').value;ctx.stroke()}};
        function setTool(t){tool=t}
        function clearCanvas(){ctx.clearRect(0,0,canvas.width,canvas.height)}
        function saveCanvas(){const a=document.createElement('a');a.download='whiteboard.png';a.href=canvas.toDataURL();a.click()}
      </script>
    </div>
  </div>
  <div id="app-footer"></div>
  <div id="app-modal"></div>
  <script>
    PageComponents.initPage({ title: '涂鸦白板', icon: 'fa-paint-brush' });
  </script>
</body>
</html>
